name: Feature request
description: Suggest a public-beta feature without private data.
title: "[Feature]: "
labels: ["feature-request", "beta-feedback"]
body:
  - type: markdown
    attributes:
      value: |
        Keep requests public/synthetic. BEAN does not yet support customer data, paid execution, or external supplier execution.
  - type: dropdown
    id: feature_area
    attributes:
      label: Feature area
      options:
        - Public demand source
        - Route scoring
        - Proof packet
        - Verifier
        - Feedback
        - Docs
        - Demo UI
        - Other public-beta feature
    validations:
      required: true
  - type: textarea
    id: request
    attributes:
      label: Request
      description: Describe the public/synthetic use case.
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundary confirmation
      options:
        - label: This request does not require private data, payment, public posting, account mutation, or external supplier execution.
          required: true
